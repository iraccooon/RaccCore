# ======================================================================================================================
# RaccCore Configuration
# Version: 1.2.1
#
# Documentation: https://github.com/iraccooon/RaccCore/tree/main
#
# Changes take effect after a server restart or plugin reload (/racccore reload).
#
# ┄ Permissions ┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄
#   /racccore reload | help ── 'racccore.admin'
# ┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄
# ======================================================================================================================


# ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# RaccStacks (stack-based item movement (smelt by stack in furnace-types, move by stack for droppers and dispensers)
# ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# ┄ Permissions ┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄
#   /raccstacks toggle ── 'raccstacks.admin'
# ┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄

# Enable stack-based furnace processing.
RaccFurnaces-enabled: false

# Enable stack-based blast furnace processing.
RaccBlastFurnaces-enabled: false

# Enable stack-based smoker processing.
RaccSmokers-enabled: false

# Enable stack-based drops from droppers.
RaccDroppers-enabled: false

# Enable stack-based ejections from dispensers.
RaccDispensers-enabled: false


# ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# Concrete Shovel (set durability)
# ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# ┄ Permissions ┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄
#   /giveconcshovel <player> ── 'giveconcshovel.use'
#   Enable RaccConcrete (water conversion) ── 'raccconcrete.use'
# ┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄

# 1561 = default diamond durability (number of blocks broken before durability hits 0).
# Set to "false" to make the shovel unbreakable.
concrete-shovel-durability: 1561


# ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# RaccCast (scheduled chat broadcasts)
# ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────

broadcasts:
  # Interval between messages.
  # Format: "<int><unit>" (e.g. "1min" or "60sec").
  interval: "10min"
  # Messages use MiniMessage syntax.
  # Must be defined on a single line ('\n' for line breaks).
  # Messages are broadcast in top-down order.
  # Create new message with hyphen (-), and surround in quotation marks.
  # See https://webui.advntr.dev/ for easy MiniMessage formatting.
  messages:
  - "<color:#777777>━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>\n<color:#ff6b6b>✦</color> <color:#cc00ff><bold>OracleMC Community</bold></color> <color:#ff6b6b>✦</color>\n<color:#f2f3f4>Join our community on Discord — stay up to date with server news, events, and activities.</color>\n<hover:show_text:'<color:#f2f3f4>Click to join!</color>'><click:open_url:'https://discord.gg/XuC6mwsfA8'><color:#ff6b6b><bold>JOIN THE DISCORD</bold></color></click></hover>\n<color:#777777>━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>"
  - "<color:#777777>━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>\n<color:#ff6b6b>✦</color> <color:#cc00ff><bold>OracleMC Store</bold></color> <color:#ff6b6b>✦</color>\n<color:#f2f3f4>Support the server and unlock exclusive ranks, perks, and coin packages.</color>\n<hover:show_text:'<color:#f2f3f4>Click to visit!</color>'><click:open_url:'https://oraclemc.online/'><color:#ff6b6b><bold>VISIT THE STORE</bold></color></click></hover>\n<color:#777777>━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>"
  - "<color:#777777>━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>\n<color:#ff6b6b>✦</color> <color:#cc00ff><bold>Join the Team</bold></color> <color:#ff6b6b>✦</color>\n<color:#f2f3f4>Think you'd make a great addition to the OracleMC staff team? We're looking for dedicated, mature players to help our community.</color>\n<hover:show_text:'<color:#f2f3f4>Click to apply!</color>'><click:open_url:'APPLICATION_URL'><color:#ff6b6b><bold>APPLY NOW</bold></color></click></hover>\n<color:#777777>━━━━━━━━━━━━━━━━━━━━━━━━━━━━</color>"
scheduled:
  - message: "<color:#cc00ff>Events are live today — check /events!</color>"
    # 24h format, server timezone
    time: "13:00"
    # optional; omit for every day
    days: [ "MON", "TUE", "WED", "THU", "FRI" ]

  - message: "<color:#ff6b6b>Server restart in 5 minutes!</color>"
    time: "18:55"


